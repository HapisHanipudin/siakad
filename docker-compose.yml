services:
  db:
    image: postgres:16-alpine
    container_name: siakad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: siakad
      POSTGRES_USER: siakad
      POSTGRES_PASSWORD: siakad
    ports:
      - "5432:5432"
    volumes:
      - siakad_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siakad -d siakad"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  siakad_postgres_data: